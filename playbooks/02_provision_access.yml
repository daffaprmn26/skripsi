---
- name: Provision reusable AWS access resources
  hosts: localhost-aws
  gather_facts: false

  tasks:
    - name: Discover AAP public egress IP
      ansible.builtin.uri:
        url: https://checkip.amazonaws.com
        return_content: true
        status_code: 200
      register: aap_public_ip_result

    - name: Normalize AAP public IP
      ansible.builtin.set_fact:
        aap_egress_cidr: "{{ aap_public_ip_result.content | trim }}/32"

    - name: Find project VPC
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ project_name }}-vpc"
          "tag:Project": "{{ project_name }}"
      register: vpc_info

    - name: Ensure exactly one project VPC was found
      ansible.builtin.assert:
        that:
          - vpc_info.vpcs | length == 1
        fail_msg: >-
          Expected exactly one VPC named {{ project_name }}-vpc,
          but found {{ vpc_info.vpcs | length }}.

    - name: Store project VPC ID
      ansible.builtin.set_fact:
        project_vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"

    - name: Import SSH public key into AWS
      amazon.aws.ec2_key:
        name: "{{ aws_key_name }}"
        region: "{{ aws_region }}"
        key_material: >-
          {{
            lookup(
              'ansible.builtin.file',
              playbook_dir ~ '/files/ansible_aws_lab.pub'
            )
          }}
        force: false
        state: present
      register: key_result

    - name: Ensure SSH security group exists
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: SSH access for the CentOS to RHEL migration lab
        vpc_id: "{{ project_vpc_id }}"
        region: "{{ aws_region }}"
        state: present
        purge_rules: true
        purge_rules_egress: true

        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: >-
              {{
                [aap_egress_cidr]
                + extra_ssh_allowed_cidrs
              }}
            rule_desc: SSH from AAP and approved client addresses

        rules_egress:
          - proto: "-1"
            cidr_ip:
              - 0.0.0.0/0
            rule_desc: Allow outbound traffic

        tags: >-
          {{
            common_tags
            | combine({'Name': security_group_name})
          }}
      register: security_group_result

    - name: Publish access resource information
      ansible.builtin.set_stats:
        data:
          lab_vpc_id: "{{ project_vpc_id }}"
          lab_key_name: "{{ aws_key_name }}"
          lab_security_group_id: "{{ security_group_result.group_id }}"
          lab_aap_egress_cidr: "{{ aap_egress_cidr }}"

    - name: Display provisioned access resources
      ansible.builtin.debug:
        msg:
          - "VPC ID: {{ project_vpc_id }}"
          - "AWS key pair: {{ aws_key_name }}"
          - "Security Group ID: {{ security_group_result.group_id }}"
          - "AAP SSH source: {{ aap_egress_cidr }}"
