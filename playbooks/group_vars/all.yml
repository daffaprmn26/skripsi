---
# Konfigurasi utama lab AWS.
# Ubah file ini jika region atau rancangan jaringan berubah.

aws_region: us-east-2
project_name: ansible

vpc_cidr: 10.20.0.0/16
public_subnet_cidr: 10.20.1.0/24

aws_key_name: "{{ project_name }}-key"
security_group_name: "{{ project_name }}-security-group"

# IP publik laptop yang diizinkan SSH langsung ke EC2.
extra_ssh_allowed_cidrs:
  - "36.69.88.215/32"

centos_ami_id: "ami-0a170f4e0a24ed220"
centos_instance_name: "{{ project_name }}-centos-source"
centos_instance_type: t3.medium
centos_root_volume_size: 30
centos_ssh_user: ec2-user

migration_expected_release: "CentOS Linux release 7.9.2009 (Core)"
migration_min_memory_mb: 2048
migration_min_root_free_mb: 4096
migration_min_var_free_mb: 4096

common_tags:
  Project: "{{ project_name }}"
  ManagedBy: Ansible
  Environment: lab
